<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">VibeDeck icon — bold musical signal</title>
  <desc id="desc">The approved cyan V and background with a bolder musical signal and star for home-screen clarity.</desc>
  <defs>
    <clipPath id="iconClip"><rect width="1024" height="1024" rx="205" ry="205"/></clipPath>
    <linearGradient id="bg" x1="180" y1="60" x2="880" y2="980" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1D2A34"/>
      <stop offset="0.52" stop-color="#111A22"/>
      <stop offset="1" stop-color="#081016"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="34%" cy="18%" r="72%">
      <stop offset="0" stop-color="#344454" stop-opacity="0.38"/>
      <stop offset="0.45" stop-color="#162430" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#05090D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="signalTrail" x1="195" y1="432" x2="790" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A0FAFF" stop-opacity="1"/>
      <stop offset="0.22" stop-color="#00E0FA" stop-opacity="1"/>
      <stop offset="0.72" stop-color="#00A8D8" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#00739B" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000000" flood-opacity="0.52"/>
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#04101A" flood-opacity="0.82"/>
    </filter>
    <filter id="cyanGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="5.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g clip-path="url(#iconClip)">
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <rect width="1024" height="1024" fill="url(#bgGlow)"/>
    <rect x="10" y="10" width="1004" height="1004" rx="196" ry="196" fill="none" stroke="#34424F" stroke-width="8" opacity="0.42"/>
    <rect x="23" y="23" width="978" height="978" rx="184" ry="184" fill="none" stroke="#050A0F" stroke-width="6" opacity="0.55"/>

    <!-- Position, V geometry and field are unchanged from the chosen musical-wave version. -->
    <g transform="translate(0 -10)">
      <g transform="translate(512 520) scale(1.08) translate(-512 -520)">
        <path d="M 774 376 C 806 408, 785 442, 738 470 C 680 503, 610 505, 560 500 C 540 496, 528 468, 515 468 C 501 468, 496 548, 481 548 C 466 548, 453 485, 438 485 C 423 485, 412 514, 394 514 C 330 503, 260 466, 206 432" fill="none" stroke="#008DBB" stroke-width="46" stroke-linecap="round" stroke-linejoin="round" opacity="0.20" filter="url(#cyanGlow)"/>

        <g filter="url(#softShadow)">
          <path d="M286 306 L512 780 L738 306" fill="none" stroke="#07546D" stroke-width="173" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M286 306 L512 780 L738 306" fill="none" stroke="#078FBD" stroke-width="163" stroke-linecap="round" stroke-linejoin="round"/>
        </g>

        <!-- Same waveform path, made materially bolder for the actual grid size. -->
        <path d="M 774 376 C 806 408, 785 442, 738 470 C 680 503, 610 505, 560 500 C 540 496, 528 468, 515 468 C 501 468, 496 548, 481 548 C 466 548, 453 485, 438 485 C 423 485, 412 514, 394 514 C 330 503, 260 466, 206 432" fill="none" stroke="url(#signalTrail)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" filter="url(#cyanGlow)"/>
        <path d="M 764 386 C 790 410, 773 435, 728 463 C 672 495, 606 497, 558 493 C 536 490, 527 462, 515 462 C 502 462, 496 542, 481 542 C 466 542, 453 479, 438 479 C 423 479, 412 508, 394 508 C 330 497, 260 460, 206 432" fill="none" stroke="#D4FDFF" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.86"/>

        <g transform="translate(206 432) scale(1.48)" filter="url(#starGlow)">
          <path d="M0 -34 C 5 -9, 9 -5, 34 0 C 9 5, 5 9, 0 34 C -5 9, -9 5, -34 0 C -9 -5, -5 -9, 0 -34Z" fill="#92F7FF"/>
          <path d="M0 -19 C 3 -5, 5 -3, 19 0 C 5 3, 3 5, 0 19 C -3 5, -5 3, -19 0 C -5 -3, -3 -5, 0 -19Z" fill="#FFFFFF" opacity="0.96"/>
        </g>
      </g>
    </g>
  </g>
</svg>
