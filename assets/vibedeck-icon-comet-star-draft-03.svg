<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">VibeDeck icon — cosmic metallic V and star comet</title>
  <desc id="desc">A graphite-metal V against a deep cosmic field, with a cyan star comet emerging from its right side.</desc>
  <defs>
    <clipPath id="iconClip"><rect width="1024" height="1024" rx="205" ry="205"/></clipPath>
    <linearGradient id="bg" x1="160" y1="20" x2="900" y2="1000" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#101C29"/>
      <stop offset="0.54" stop-color="#09131D"/>
      <stop offset="1" stop-color="#04090E"/>
    </linearGradient>
    <radialGradient id="topGlow" cx="69%" cy="17%" r="62%">
      <stop offset="0" stop-color="#0B4162" stop-opacity="0.34"/>
      <stop offset="0.36" stop-color="#0A2A40" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#02060A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="farOrbit" x1="20" y1="60" x2="1000" y2="610" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0D3550" stop-opacity="0.02"/>
      <stop offset="0.40" stop-color="#2A6A93" stop-opacity="0.30"/>
      <stop offset="0.63" stop-color="#73D5FF" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#0D3550" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="vMetal" x1="235" y1="195" x2="765" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F4F8FD"/>
      <stop offset="0.16" stop-color="#C4D0DE"/>
      <stop offset="0.42" stop-color="#718196"/>
      <stop offset="0.67" stop-color="#334252"/>
      <stop offset="0.86" stop-color="#61738A"/>
      <stop offset="1" stop-color="#9FACBC"/>
    </linearGradient>
    <linearGradient id="cometTrail" x1="210" y1="432" x2="830" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2DE6FF" stop-opacity="1"/>
      <stop offset="0.16" stop-color="#00D1FF" stop-opacity="0.98"/>
      <stop offset="0.62" stop-color="#0096FF" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#005DE8" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="30" stdDeviation="30" flood-color="#000000" flood-opacity="0.58"/>
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#04101A" flood-opacity="0.82"/>
    </filter>
    <filter id="cyanGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g clip-path="url(#iconClip)">
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <rect width="1024" height="1024" fill="url(#topGlow)"/>

    <!-- Very quiet orbital bands: a background cue from the Import Hub, never a second logo. -->
    <path d="M -140 82 C 220 36 676 136 1120 510" fill="none" stroke="url(#farOrbit)" stroke-width="28" opacity="0.18"/>
    <path d="M -120 194 C 252 132 690 246 1080 602" fill="none" stroke="#286187" stroke-width="5" opacity="0.12"/>
    <circle cx="172" cy="186" r="1.7" fill="#BEEFFF" opacity="0.56"/>
    <circle cx="786" cy="155" r="2" fill="#BEEFFF" opacity="0.48"/>
    <circle cx="865" cy="230" r="1.2" fill="#BEEFFF" opacity="0.42"/>
    <circle cx="684" cy="108" r="1.1" fill="#BEEFFF" opacity="0.38"/>

    <rect x="10" y="10" width="1004" height="1004" rx="196" ry="196" fill="none" stroke="#34424F" stroke-width="8" opacity="0.42"/>
    <rect x="23" y="23" width="978" height="978" rx="184" ry="184" fill="none" stroke="#050A0F" stroke-width="6" opacity="0.62"/>

    <!-- The ghosted tail begins inside the right side of the mark. -->
    <path d="M 804 356 C 840 396 800 436 746 468 C 606 550 388 516 234 432" fill="none" stroke="#007CE8" stroke-width="32" stroke-linecap="round" opacity="0.18" filter="url(#cyanGlow)"/>

    <!-- Approved V geometry, with a colder graphite-silver finish. -->
    <g filter="url(#softShadow)">
      <path d="M286 306 L512 780 L738 306" fill="none" stroke="url(#vMetal)" stroke-width="165" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M286 306 L512 780 L738 306" fill="none" stroke="#DDEBFA" stroke-width="169" stroke-linecap="round" stroke-linejoin="round" opacity="0.10"/>
    </g>

    <!-- This front pass makes the comet read as orbiting the volume of the V. -->
    <path d="M 804 356 C 840 396 800 436 746 468 C 606 550 388 516 234 432" fill="none" stroke="url(#cometTrail)" stroke-width="10" stroke-linecap="round" filter="url(#cyanGlow)"/>
    <path d="M 792 366 C 824 400 790 430 736 461 C 598 535 388 505 234 432" fill="none" stroke="#A6F4FF" stroke-width="2.1" stroke-linecap="round" opacity="0.76"/>

    <!-- Star geometry and colours are unchanged. -->
    <g transform="translate(234 432)" filter="url(#cyanGlow)">
      <path d="M0 -34 C 5 -9, 9 -5, 34 0 C 9 5, 5 9, 0 34 C -5 9, -9 5, -34 0 C -9 -5, -5 -9, 0 -34Z" fill="#92F7FF"/>
      <path d="M0 -19 C 3 -5, 5 -3, 19 0 C 5 3, 3 5, 0 19 C -3 5, -5 3, -19 0 C -5 -3, -3 -5, 0 -19Z" fill="#FFFFFF" opacity="0.92"/>
    </g>
  </g>
</svg>
