<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">VibeDeck icon — V with a star comet</title>
  <desc id="desc">A glass V with a cyan star flying out of its right side along a curved comet trail.</desc>
  <defs>
    <clipPath id="iconClip"><rect width="1024" height="1024" rx="205" ry="205"/></clipPath>

    <linearGradient id="bg" x1="180" y1="60" x2="880" y2="980" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1D2A34"/>
      <stop offset="0.52" stop-color="#111A22"/>
      <stop offset="1" stop-color="#081016"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="34%" cy="18%" r="72%">
      <stop offset="0" stop-color="#344454" stop-opacity="0.38"/>
      <stop offset="0.45" stop-color="#162430" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#05090D" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="vStroke" x1="285" y1="210" x2="710" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F5F9FF"/>
      <stop offset="0.22" stop-color="#C8D2DD"/>
      <stop offset="0.56" stop-color="#8492A0"/>
      <stop offset="1" stop-color="#3D4954"/>
    </linearGradient>
    <linearGradient id="vHighlight" x1="230" y1="210" x2="650" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="0.44" stop-color="#E8F2FF" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="cometTrail" x1="210" y1="432" x2="830" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C8FDFF" stop-opacity="1"/>
      <stop offset="0.12" stop-color="#55F1FF" stop-opacity="0.98"/>
      <stop offset="0.60" stop-color="#16DFFF" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#00BFFF" stop-opacity="0.16"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000000" flood-opacity="0.44"/>
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#0A1720" flood-opacity="0.70"/>
    </filter>
    <filter id="cyanGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g clip-path="url(#iconClip)">
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <rect width="1024" height="1024" fill="url(#bgGlow)"/>
    <rect x="10" y="10" width="1004" height="1004" rx="196" ry="196" fill="none" stroke="#34424F" stroke-width="8" opacity="0.42"/>
    <rect x="23" y="23" width="978" height="978" rx="184" ry="184" fill="none" stroke="#050A0F" stroke-width="6" opacity="0.55"/>

    <!-- The comet's fading tail begins inside the right side of the V. -->
    <path d="M 804 356 C 840 396 800 436 746 468 C 606 550 388 516 234 432"
          fill="none" stroke="#00CFFF" stroke-width="28" stroke-linecap="round" opacity="0.16" filter="url(#cyanGlow)"/>

    <!-- This is the V shape from the approved vector source, unchanged. -->
    <g filter="url(#softShadow)">
      <path d="M286 306 L512 780 L738 306" fill="none" stroke="url(#vStroke)" stroke-width="165" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M286 306 L512 780 L738 306" fill="none" stroke="#F8FBFF" stroke-width="171" stroke-linecap="round" stroke-linejoin="round" opacity="0.18"/>
      <path d="M282 302 L512 780 L738 306" fill="none" stroke="url(#vHighlight)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" opacity="0.70"/>
    </g>

    <!-- The visible flight path exits the V and sweeps to the left. -->
    <path d="M 804 356 C 840 396 800 436 746 468 C 606 550 388 516 234 432"
          fill="none" stroke="url(#cometTrail)" stroke-width="10" stroke-linecap="round" filter="url(#cyanGlow)"/>
    <path d="M 792 366 C 824 400 790 430 736 461 C 598 535 388 505 234 432"
          fill="none" stroke="#D9FEFF" stroke-width="2.4" stroke-linecap="round" opacity="0.86"/>

    <!-- Existing star design, moved to the comet's leading point only. -->
    <g transform="translate(234 432)" filter="url(#cyanGlow)">
      <path d="M0 -34 C 5 -9, 9 -5, 34 0 C 9 5, 5 9, 0 34 C -5 9, -9 5, -34 0 C -9 -5, -5 -9, 0 -34Z" fill="#92F7FF"/>
      <path d="M0 -19 C 3 -5, 5 -3, 19 0 C 5 3, 3 5, 0 19 C -3 5, -5 3, -19 0 C -5 -3, -3 -5, 0 -19Z" fill="#FFFFFF" opacity="0.92"/>
    </g>
  </g>
</svg>
